# Cartera de Inversiones - Add-on para Home Assistant (VERSIÓN DE PRUEBA)
# https://developers.home-assistant.io/docs/add-ons/configuration

name: Cartera TEST
description: Aplicacion de cartera de inversiones (acciones, ETFs, fondos, criptos) con Streamlit. Gestiona movimientos, dividendos y fiscalidad. VERSION DE PRUEBA - puerto 8502. Puedes elegir la ruta de la base de datos en Configuracion (ej. /config, /share/cartera).
version: "1.0.3"
slug: cartera_test
url: "https://github.com/aupacheca/ha-cartera-addons"
arch:
  - aarch64
  - armv7
  - armhf
  - amd64
  - i386
init: false
# addon_config:rw = carpeta escribible accesible por Samba (addon_configs)
# share:rw = carpeta /share accesible por Samba (permite elegir ruta de BD)
map:
  - addon_config:rw
  - share:rw
ports:
  "8502/tcp": 8502
ports_description:
  "8502": "Interfaz web Streamlit (version de prueba)"
options:
  data_path: "/config"
schema:
  data_path: str

# Imagen base Debian (mejor soporte de wheels para numpy/pandas en Raspberry Pi)
# Alpine fallaba al compilar; Debian tiene wheels precompilados para ARM64
build_from:
  aarch64: python:3.12-slim-bookworm
  armhf: arm32v7/python:3.12-slim-bookworm
  armv7: arm32v7/python:3.12-slim-bookworm
  amd64: python:3.12-slim-bookworm
  i386: i386/python:3.12-slim-bookworm
